appId: com.projectremnant.launcher
productName: Remnant Launcher
artifactName: RemnantLauncher-Setup-${version}.${ext}

directories:
  output: release
  buildResources: build

# Explicit files glob — electron-updater requires `debug → ms` at
# runtime, both lazily required from inside the package, so without
# spelling out `node_modules/**/*` electron-builder's prune step skips
# them and the launcher dies with "Cannot find module 'ms'". Defaults
# do not resolve this case correctly. Note: `extract-zip` is bundled
# into the main process directly (see electron.vite.config.mjs) so its
# transitives don't need to be packed in node_modules.
files:
  - out/**/*
  - package.json
  - node_modules/**/*

# Ship build/icon.ico into resources/icon.ico of the packaged app so the
# runtime APP_ICON_PATH resolver in src/main/index.js can find it via
# process.resourcesPath. Used by BrowserWindow `icon:` and the system
# tray. The win.icon entry below sets the binary icon (Explorer + Start
# Menu); this entry covers the runtime window + tray.
extraResources:
  - from: build/icon.ico
    to: icon.ico

win:
  target: nsis
  icon: build/icon.ico
  # Register the launcher as the OS-level handler for `remnant://` URLs.
  # Game-side code calls shell.openExternal('remnant://launch') when it
  # detects a direct game launch (no JWT on stdin); Windows finds the
  # launcher binary via this registration and routes the URL to it.
  # Same pattern FFXIV / Battle.net / Riot use to ensure all game starts
  # go through the launcher.
  protocols:
    - name: Remnant Launcher
      schemes:
        - remnant

# NSIS installer config — explicitly NOT one-click. The launcher is the
# only thing players ever download, so the install location matters; let
# them pick a drive (e.g. NVMe vs HDD). Industry-standard install UX.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Remnant Launcher

# electron-updater publishes drafts to a public release repo. PR 4 wires
# the actual repo + the pnpm release:launcher flow; this stub is in
# place so the manifest writer doesn't error during PR 1 builds.
publish:
  - provider: github
    owner: bmtuer
    repo: project-remnant-launcher-releases
    releaseType: draft

releaseInfo:
  releaseName: v${version}
