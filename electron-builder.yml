appId: com.projectremnant.launcher
productName: Remnant Launcher
artifactName: RemnantLauncher-Setup-${version}.${ext}

directories:
  output: release
  buildResources: build

# Explicit `files:` block was previously `out/**/* + package.json` only,
# which broke runtime: electron-updater requires `debug` which requires
# `ms`, both of which live under pnpm's flat .pnpm/ layout. Without
# node_modules in the files glob, electron-builder packs the asar without
# them and the launcher dies on startup with "Cannot find module 'ms'".
# The defaults electron-builder uses when no `files:` is specified do
# resolve pnpm symlinks correctly — we just need to spell out the glob.
files:
  - out/**/*
  - package.json
  - node_modules/**/*

win:
  target: nsis
  icon: build/icon.ico
  # Register the launcher as the OS-level handler for `remnant://` URLs.
  # Game-side code calls shell.openExternal('remnant://launch') when it
  # detects a direct game launch (no JWT on stdin); Windows finds the
  # launcher binary via this registration and routes the URL to it.
  # Same pattern FFXIV / Battle.net / Riot use to ensure all game starts
  # go through the launcher.
  protocols:
    - name: Remnant Launcher
      schemes:
        - remnant

# NSIS installer config — explicitly NOT one-click. The launcher is the
# only thing players ever download, so the install location matters; let
# them pick a drive (e.g. NVMe vs HDD). Industry-standard install UX.
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Remnant Launcher

# electron-updater publishes drafts to a public release repo. PR 4 wires
# the actual repo + the pnpm release:launcher flow; this stub is in
# place so the manifest writer doesn't error during PR 1 builds.
publish:
  - provider: github
    owner: bmtuer
    repo: project-remnant-launcher-releases
    releaseType: draft

releaseInfo:
  releaseName: v${version}
